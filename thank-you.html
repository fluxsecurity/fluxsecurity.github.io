<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — FluxSec</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .thank-you {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .thank-you-content {
            max-width: 500px;
        }

        .thank-you-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 2rem;
            color: var(--text-primary);
        }

        .thank-you h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
        }

        .thank-you p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <img src="assets/images/logo-white.svg" alt="FluxSec Logo" class="logo-img">
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#quote">Get a Quote</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="thank-you">
        <div class="thank-you-content">
            <svg class="thank-you-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <h1>Thank You</h1>
            <p>
                Your quote request has been received. We'll review your requirements and get back to you within 24 hours.
            </p>
            <a href="index.html" class="btn btn-primary">Back to Home</a>
        </div>
    </section>

</body>
</html>
